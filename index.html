<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ligma Browser - Fast. Modern. Private.">
  <meta name="theme-color" content="#0B0F14">
  <title>Ligma Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0B0F14;
      --bg-alt: #0E141B;
      --card: rgba(25,25,30,.65);
      --card-hover: rgba(35,35,45,.75);
      --elevated: rgba(20,20,28,.85);
      --accent: #4ADE80;
      --accent2: #00E5FF;
      --text: #fff;
      --text2: rgba(255,255,255,.65);
      --text3: rgba(255,255,255,.35);
      --border: rgba(255,255,255,.1);
      --border-hi: rgba(74,222,128,.35);
      --r: 16px;
      --r-pill: 9999px;
      --shadow: 0 8px 32px rgba(0,0,0,.4);
      --glow: 0 0 24px rgba(74,222,128,.15);
      --blur: blur(20px) saturate(180%);
      --font: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    body.light-mode {
      --bg: #f5f5f5;
      --bg-alt: #eee;
      --card: rgba(255,255,255,.85);
      --card-hover: rgba(240,240,240,.95);
      --elevated: rgba(255,255,255,.95);
      --text: #1a1a1a;
      --text2: rgba(0,0,0,.6);
      --text3: rgba(0,0,0,.35);
      --border: rgba(0,0,0,.1);
      --border-hi: rgba(74,222,128,.5);
      --shadow: 0 8px 32px rgba(0,0,0,.12);
      --glow: 0 0 24px rgba(74,222,128,.1);
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; overflow-x: hidden; line-height: 1.5; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    input { font-family: inherit; border: none; background: none; color: inherit; outline: none; }
    a { color: inherit; text-decoration: none; }
    ::selection { background: rgba(74,222,128,.3); }
    :focus-visible { outline: none; }
    .search-bar:focus-within { outline: 2px solid var(--accent); outline-offset: 2px; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Background */
    .bg {
      position: fixed; inset: 0; z-index: -2; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(74,222,128,.08), transparent),
        radial-gradient(ellipse 60% 40% at 85% 100%, rgba(0,229,255,.06), transparent),
        var(--bg);
    }
    .grid {
      position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: .02;
      background-image:
        linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    canvas#particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

    /* ===== HOME (Center) ===== */
    .home {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem; gap: 0;
    }
    .logo {
      font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 700; letter-spacing: -.04em;
      background: repeating-conic-gradient(#32CD32 0% 25%, #00FF00 25% 50%) 0 0 / 40px 40px;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
      animation: logoScroll .6s linear infinite;
      user-select: none;
    }
    @keyframes logoScroll {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }
    .logo .letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(-60px) rotate(-15deg);
      animation: letterDrop .5s cubic-bezier(.17,.67,.35,1.2) forwards;
    }
    .logo .space { display: inline-block; width: .3em; }
    @keyframes letterDrop {
      0% { opacity: 0; transform: translateY(-60px) rotate(-15deg); }
      60% { opacity: 1; transform: translateY(6px) rotate(2deg); }
      80% { transform: translateY(-3px) rotate(-1deg); }
      100% { opacity: 1; transform: translateY(0) rotate(0deg); }
    }
    .tagline {
      font-size: clamp(.9rem, 2vw, 1.1rem); color: var(--text2); margin-top: .3rem; text-align: center;
    }

    /* Search bar */
    .search-wrap {
      width: 100%; max-width: 620px; margin-top: 2.5rem; position: relative;
    }
    .search-bar {
      display: flex; align-items: center; width: 100%; height: 58px;
      background: var(--card); border: none; border-radius: var(--r-pill);
      backdrop-filter: var(--blur); transition: all .2s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,.4); overflow: hidden;
    }
    .search-bar:focus-within {
      box-shadow: var(--shadow);
    }
    .search-bar:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .search-icon {
      display: flex; align-items: center; justify-content: center; width: 52px; flex-shrink: 0;
      color: var(--text3); pointer-events: none;
    }
    .search-icon svg { width: 20px; height: 20px; }
    .search-bar input {
      flex: 1; height: 100%; padding: 0 16px; font-size: 1.05rem;
    }
    .search-bar input::placeholder { color: var(--text3); }
    .search-go {
      display: flex; align-items: center; justify-content: center;
      width: 46px; height: 46px; margin-right: 6px; border-radius: var(--r-pill); flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #0B0F14;
      transition: all .2s ease;
    }
    .search-go:hover { transform: scale(1.06); box-shadow: var(--glow); }
    .search-go:active { transform: scale(.95); }
    .search-go svg { width: 20px; height: 20px; }

    /* Keyboard hint */
    .kbd-hint {
      margin-top: 12px; font-size: .75rem; color: var(--text3); display: flex; gap: 16px;
    }
    .kbd-hint kbd {
      display: inline-flex; align-items: center; padding: 2px 7px; font-family: var(--mono);
      font-size: .68rem; background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; margin: 0 3px;
    }

    /* Quick links */
    .quick {
      display: flex; gap: 12px; margin-top: 2rem; flex-wrap: wrap; justify-content: center;
    }
    .quick a {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      width: 88px; padding: 16px 8px; border-radius: var(--r);
      background: var(--card); border: 1px solid var(--border); backdrop-filter: var(--blur);
      transition: all .2s ease; font-size: .75rem; color: var(--text2); font-weight: 500;
    }
    .quick a:hover {
      border-color: var(--border-hi); transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,.3); color: var(--text);
    }
    .quick a img { width: 28px; height: 28px; border-radius: 6px; }

    /* ===== RESULTS PAGE ===== */
    .results { display: none; flex: 1; flex-direction: column; }
    .results.show { display: flex; }

    /* Results header / top bar */
    .results-bar {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; gap: 12px; padding: 12px 24px;
      background: rgba(11,15,20,.85); backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--border);
    }
    .results-logo {
      font-size: 1.3rem; font-weight: 700; letter-spacing: -.03em;
      color: #32CD32;
      background:
        repeating-conic-gradient(#32CD32 0% 25%, #00FF00 25% 50%) 0 0 / 40px 40px;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: logoScroll .6s linear infinite;
      cursor: pointer; flex-shrink: 0; user-select: none;
    }
    .results-search {
      flex: 1; max-width: 600px; height: 44px;
      display: flex; align-items: center;
      background: var(--card); border: 1px solid var(--border); border-radius: var(--r-pill);
      backdrop-filter: var(--blur); transition: all .2s ease;
    }
    .results-search:focus-within { border-color: var(--border); }
    .results-search .search-icon { width: 40px; }
    .results-search .search-icon svg { width: 16px; height: 16px; }
    .results-search input { flex: 1; height: 100%; padding: 0 12px; font-size: .95rem; min-width: 0; }
    .results-search .search-go { width: 36px; height: 36px; margin-right: 4px; }
    .results-search .search-go svg { width: 16px; height: 16px; }

    .results-stats {
      padding: 16px clamp(1.5rem,5vw,4rem); color: var(--text3); font-size: .85rem;
    }
    .results-stats strong { color: var(--text2); }

    .loading-bar {
      width: 100%; max-width: 400px; height: 4px; margin: 0 auto;
      background: var(--bg-alt); border-radius: 999px; overflow: hidden;
    }
    .loading-bar::after {
      content: ''; display: block; width: 40%; height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 999px;
      animation: loadingSlide 1s ease-in-out infinite;
    }
    @keyframes loadingSlide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    .results-list {
      flex: 1; padding: 0 clamp(1rem,5vw,4rem) 4rem;
      display: flex; flex-direction: column; gap: 0;
      max-width: 720px; width: 100%; margin: 0 auto;
    }

    .result-item {
      padding: 20px 0; border-bottom: 1px solid var(--border);
      transition: all .15s ease;
    }
    .result-item:last-child { border-bottom: none; }
    .result-item:hover .result-title { color: var(--accent); }
    .result-url {
      font-size: .78rem; color: var(--text3); font-family: var(--mono);
      display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
    }
    .result-url img { width: 14px; height: 14px; border-radius: 2px; }
    .result-title {
      font-size: 1.15rem; font-weight: 600; color: var(--accent2); margin-bottom: 4px;
      transition: color .15s ease; display: inline;
    }
    .result-desc {
      font-size: .9rem; color: var(--text2); line-height: 1.55;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }

    /* Pagination */
    .pagination {
      display: flex; justify-content: center; gap: 8px; padding: 2rem 1rem 4rem;
    }
    .pagination button {
      padding: 10px 20px; border-radius: var(--r-pill);
      background: var(--card); border: 1px solid var(--border); color: var(--text2);
      font-size: .9rem; font-weight: 500; transition: all .2s ease; backdrop-filter: var(--blur);
    }
    .pagination button:hover { border-color: var(--accent); color: var(--text); }
    .pagination button.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #0B0F14; border-color: transparent; }

    /* ===== FOOTER ===== */
    footer {
      text-align: center; padding: 20px; font-size: .75rem; color: var(--text3);
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); }
    footer a:hover { text-decoration: underline; }

    /* ===== SETTINGS MENU ===== */
    .settings-btn {
      position: fixed; top: 16px; right: 20px; z-index: 100;
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--card); border: 1px solid var(--border);
      backdrop-filter: var(--blur); color: var(--text2);
      display: flex; align-items: center; justify-content: center;
      transition: all .2s ease; cursor: pointer;
    }
    .settings-btn:hover { color: var(--text); border-color: var(--border-hi); background: var(--card-hover); }
    .settings-btn svg { width: 20px; height: 20px; }
    .settings-menu {
      position: fixed; top: 66px; right: 20px; z-index: 100;
      min-width: 200px; background: var(--elevated); border: 1px solid var(--border);
      border-radius: var(--r); backdrop-filter: var(--blur); box-shadow: var(--shadow-lg);
      padding: 8px; opacity: 0; visibility: hidden; transform: translateY(-8px);
      transition: all .2s ease;
    }
    .settings-menu.open { opacity: 1; visibility: visible; transform: translateY(0); }
    .settings-menu h3 {
      padding: 10px 14px 8px; font-size: .7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .06em; color: var(--text3);
    }
    .settings-menu .divider {
      height: 1px; background: var(--border); margin: 6px 0;
    }
    .settings-menu button {
      display: flex; align-items: center; gap: 10px; width: 100%;
      padding: 10px 14px; border-radius: 8px; font-size: .88rem;
      color: var(--text2); transition: all .15s ease; text-align: left;
    }
    .settings-menu button:hover { background: var(--card-hover); color: var(--text); }
    .settings-menu button svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* Toggle */
    .toggle {
      position: relative; width: 38px; height: 22px; margin-left: auto; flex-shrink: 0;
      background: var(--bg-alt); border: 1px solid var(--border); border-radius: 999px;
      cursor: pointer; transition: all .2s ease;
    }
    .toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 16px; height: 16px; background: var(--text); border-radius: 50%;
      transition: transform .2s ease;
    }
    .toggle.on { background: var(--accent); border-color: var(--accent); }
    .toggle.on::after { transform: translateX(16px); background: #0B0F14; }

    /* About modal */
    .modal-bg {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.55); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; transition: all .2s ease;
    }
    .modal-bg.open { opacity: 1; visibility: visible; }
    .modal {
      width: 90%; max-width: 400px;
      background: var(--elevated); border: 1px solid var(--border);
      border-radius: var(--r); box-shadow: var(--shadow-lg);
      padding: 28px; text-align: center;
      transform: scale(.95); transition: transform .2s ease;
    }
    .modal-bg.open .modal { transform: scale(1); }
    .modal h2 { font-size: 1.3rem; margin-bottom: .4rem; }
    .modal p { font-size: .88rem; color: var(--text2); margin-bottom: 1.2rem; }
    .modal .btn {
      padding: 10px 24px; border-radius: var(--r-pill); font-weight: 600;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0B0F14; border: none; cursor: pointer; font-size: .9rem;
      transition: all .2s ease;
    }
    .modal .btn:hover { transform: scale(1.03); }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 2000;
      padding: 12px 20px; background: var(--elevated); border: 1px solid var(--border);
      border-radius: var(--r); box-shadow: var(--shadow); backdrop-filter: var(--blur);
      font-size: .88rem; animation: toastIn .3s cubic-bezier(.2,0,0,1);
    }
    @keyframes toastIn { from{opacity:0;transform:translateX(60px)} to{opacity:1;transform:translateX(0)} }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .home { padding: 1rem; }
      .search-wrap { max-width: 100%; margin-top: 2rem; }
      .search-bar { height: 50px; }
      .search-bar input { font-size: .95rem; padding: 0 12px; }
      .search-icon { width: 42px; }
      .search-go { width: 40px; height: 40px; margin-right: 4px; }
      .quick { gap: 8px; margin-top: 1.5rem; }
      .quick a { width: 68px; padding: 12px 6px; font-size: .65rem; }
      .quick a img { width: 24px; height: 24px; }
      .results-bar { padding: 10px 12px; gap: 8px; }
      .results-logo { font-size: 1rem; flex-shrink: 0; }
      .results-search { height: 40px; }
      .results-search input { font-size: .85rem; padding: 0 8px; }
      .results-search .search-icon { width: 32px; }
      .results-search .search-go { width: 32px; height: 32px; }
      .results-list { padding: 0 1rem 3rem; }
      .result-title { font-size: 1rem; }
      .result-desc { font-size: .82rem; }
      .settings-btn { top: 10px; right: 12px; width: 38px; height: 38px; }
      .settings-btn svg { width: 18px; height: 18px; }
      .settings-menu { top: 58px; right: 12px; min-width: 180px; }
      .pagination { padding: 1.5rem 1rem 3rem; }
      .pagination button { padding: 8px 16px; font-size: .82rem; }
      footer { padding: 16px 12px; font-size: .7rem; }
    }
    @media (max-width: 360px) {
      .logo { font-size: 2rem; }
      .search-bar { height: 46px; }
      .quick { gap: 6px; }
      .quick a { width: 58px; padding: 10px 4px; font-size: .6rem; }
      .quick a img { width: 20px; height: 20px; }
    }
    @media (min-width: 641px) and (max-width: 1024px) {
      .search-wrap { max-width: 540px; }
      .quick a { width: 80px; padding: 14px 6px; }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="grid" aria-hidden="true"></div>
  <canvas id="particles" aria-hidden="true"></canvas>

  <!-- Settings button -->
  <button class="settings-btn" id="settingsBtn" aria-label="Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>

  <!-- Settings dropdown -->
  <div class="settings-menu" id="settingsMenu">
    <h3>Appearance</h3>
    <button id="toggleDark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      Dark Mode
      <div class="toggle on" id="darkToggle"></div>
    </button>
    <button id="toggleParticles">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      Particles
      <div class="toggle on" id="particleToggle"></div>
    </button>
    <div class="divider"></div>
    <h3>Info</h3>
    <button id="aboutBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      About
    </button>
    <button id="shortcutsBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h.01M12 12h.01M16 12h.01M8 16h8"/></svg>
      Keyboard Shortcuts
    </button>
  </div>

  <!-- About modal -->
  <div class="modal-bg" id="aboutModal">
    <div class="modal">
      <h2 style="background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Ligma Browser</h2>
      <p>Fast. Modern. Private.<br>Version 2.0.0</p>
      <p style="font-size:.8rem;color:var(--text3)">No tracking. No ads.</p>
      <button class="btn" id="closeAbout">Got it</button>
    </div>
  </div>

  <!-- Shortcuts modal -->
  <div class="modal-bg" id="shortcutsModal">
    <div class="modal" style="text-align:left">
      <h2 style="text-align:center;margin-bottom:1rem">Keyboard Shortcuts</h2>
      <div style="display:flex;flex-direction:column;gap:10px;font-size:.88rem">
        <div style="display:flex;justify-content:space-between"><span>Focus search</span><kbd style="font-family:var(--mono);font-size:.75rem;padding:2px 8px;background:var(--card);border:1px solid var(--border);border-radius:6px">/</kbd></div>
        <div style="display:flex;justify-content:space-between"><span>Search</span><kbd style="font-family:var(--mono);font-size:.75rem;padding:2px 8px;background:var(--card);border:1px solid var(--border);border-radius:6px">Enter</kbd></div>
        <div style="display:flex;justify-content:space-between"><span>Go home</span><kbd style="font-family:var(--mono);font-size:.75rem;padding:2px 8px;background:var(--card);border:1px solid var(--border);border-radius:6px">Esc</kbd></div>
      </div>
      <div style="text-align:center;margin-top:1.2rem"><button class="btn" id="closeShortcuts">Got it</button></div>
    </div>
  </div>

  <!-- ===== HOME PAGE ===== -->
  <div class="home" id="home">
    <div class="logo" id="logo" aria-hidden="true">Ligma Browser</div>
    <p class="tagline">Fast. Modern. Private.</p>

    <form class="search-wrap" id="searchForm" role="search" aria-label="Search">
      <div class="search-bar">
        <div class="search-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <input type="text" id="searchInput" placeholder="Search the web..." autocomplete="off" spellcheck="false" aria-label="Search query">
        <button type="submit" class="search-go" aria-label="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>
    </form>

    <div class="quick" aria-label="Quick links">
      <a href="https://www.google.com" target="_blank" rel="noopener">
        <img src="https://www.google.com/favicon.ico" width="28" height="28" alt="" onerror="this.style.display='none'">
        Google
      </a>
      <a href="https://github.com" target="_blank" rel="noopener">
        <img src="https://github.com/favicon.ico" width="28" height="28" alt="" onerror="this.style.display='none'">
        GitHub
      </a>
      <a href="https://www.youtube.com" target="_blank" rel="noopener">
        <img src="https://www.youtube.com/favicon.ico" width="28" height="28" alt="" onerror="this.style.display='none'">
        YouTube
      </a>
      <a href="https://www.wikipedia.org" target="_blank" rel="noopener">
        <img src="https://www.wikipedia.org/favicon.ico" width="28" height="28" alt="" onerror="this.style.display='none'">
        Wikipedia
      </a>
      <a href="https://chat.openai.com" target="_blank" rel="noopener">
        <img src="https://chat.openai.com/favicon.ico" width="28" height="28" alt="" onerror="this.style.display='none'">
        ChatGPT
      </a>
      <a href="https://www.reddit.com" target="_blank" rel="noopener">
        <img src="https://www.reddit.com/favicon.ico" width="28" height="28" alt="" onerror="this.style.display='none'">
        Reddit
      </a>
    </div>
  </div>

  <!-- ===== RESULTS PAGE ===== -->
  <div class="results" id="results">
    <div class="results-bar">
      <div class="results-logo" id="logoHome">Ligma Browser</div>
      <form class="results-search" id="resultsForm" role="search">
        <div class="search-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <input type="text" id="resultsInput" autocomplete="off" spellcheck="false" aria-label="Search query">
        <button type="submit" class="search-go" aria-label="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </form>
    </div>
    <div class="results-stats" id="stats"></div>
    <div class="results-list" id="resultsList"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer>
    <p>Ligma Browser - No tracking. No ads.</p>
  </footer>

  <script>
  (function() {
    'use strict';

    const $ = s => document.querySelector(s);
    const esc = t => { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; };

    // ============================================
    // PARTICLE CANVAS
    // ============================================
    // Split logo into animated letters
    (function splitLogo() {
      const logo = $('#logo');
      if (!logo) return;
      const text = 'Ligma Browser';
      let html = '';
      for (let i = 0; i < text.length; i++) {
        if (text[i] === ' ') {
          html += '<span class="space"></span>';
        } else {
          html += '<span class="letter" style="animation-delay:' + (i * 0.06) + 's">' + text[i] + '</span>';
        }
      }
      logo.innerHTML = html;
    })();

    (function initParticles() {
      const canvas = $('#particles');
      const ctx = canvas.getContext('2d');
      const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      let ps = [];
      let running = false;
      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      function mk() {
        return {
          x: Math.random() * canvas.width,
          y: canvas.height + Math.random() * 60,
          vx: (Math.random() - .5) * .25,
          vy: -.15 - Math.random() * .35,
          r: .6 + Math.random() * 1.5,
          o: .06 + Math.random() * .2,
          c: Math.random() > .5 ? '74,222,128' : '0,229,255',
        };
      }
      function loop() {
        if (!running) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ps.forEach(p => {
          p.x += p.vx; p.y += p.vy;
          if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(' + p.c + ',' + p.o + ')';
          ctx.fill();
        });
        requestAnimationFrame(loop);
      }
      resize();
      ps = Array.from({ length: 45 }, mk);
      if (!reduced) { running = true; loop(); }
      window.addEventListener('resize', resize);
      window._particleApi = {
        start() { if (!running) { running = true; loop(); } },
        stop() { running = false; },
      };
    })();

    // ============================================
    // LIGMA SEARCH ENGINE
    // Uses DuckDuckGo Lite's HTML endpoint
    // (no API key, no tracking, works from any origin)
    // ============================================
    const DDG_URL = 'https://html.duckduckgo.com/html/';
    const PROXIES = [
      url => 'https://api.allorigins.win/get?url=' + encodeURIComponent(url),
    ];

    function buildSearchURL(query, page) {
      const params = new URLSearchParams({
        q: query,
        kl: 'us-en',
      });
      if (page > 1) params.set('s', String((page - 1) * 30));
      params.set('dc', String((page - 1) * 30 + 1));
      return DDG_URL + '?' + params.toString();
    }

    function fetchTimeout(url, ms) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), ms);
      return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(id));
    }

    async function fetchResults(query, page) {
      const url = buildSearchURL(query, page);
      for (const proxy of PROXIES) {
        try {
          const resp = await fetchTimeout(proxy(url), 8000);
          if (!resp.ok) continue;
          const json = await resp.json();
          const html = json.contents;
          if (html && html.includes('result')) {
            return parseResults(html);
          }
        } catch {}
      }
      return { results: [], total: 0, error: 'Search failed. Try again.' };
    }

    function parseResults(html) {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const results = [];

      // DuckDuckGo HTML uses .result__body for each result
      doc.querySelectorAll('.result').forEach(el => {
        const linkEl = el.querySelector('.result__a');
        const snippetEl = el.querySelector('.result__snippet');
        const urlEl = el.querySelector('.result__url');
        if (!linkEl) return;
        const href = linkEl.getAttribute('href') || '';
        // DDG HTML wraps URLs, try to extract the real one
        let realUrl = href;
        if (href.includes('uddg=')) {
          try { realUrl = decodeURIComponent(new URL(href, 'https://duckduckgo.com').searchParams.get('uddg')); } catch {}
        }
        results.push({
          title: linkEl.textContent.trim(),
          url: realUrl,
          displayUrl: urlEl ? urlEl.textContent.trim() : realUrl,
          desc: snippetEl ? snippetEl.textContent.trim() : '',
        });
      });

      // Try to get result count
      let total = 0;
      const countEl = doc.querySelector('.results--main .result--ad + .result');
      // DuckDuckGo HTML doesn't always show a count, estimate from results
      total = results.length;

      return { results, total };
    }

    // ============================================
    // STATE
    // ============================================
    let currentQuery = '';
    let currentPage = 1;

    // ============================================
    // DOM REFS
    // ============================================
    const homeEl = $('#home');
    const resultsEl = $('#results');
    const searchInput = $('#searchInput');
    const resultsInput = $('#resultsInput');
    const resultsList = $('#resultsList');
    const statsEl = $('#stats');
    const pagEl = $('#pagination');

    // ============================================
    // SEARCH FLOW
    // ============================================
    async function doSearch(query, page) {
      if (!query.trim()) return;
      currentQuery = query.trim();
      currentPage = page || 1;

      // Switch to results view
      homeEl.style.display = 'none';
      resultsEl.classList.add('show');
      resultsInput.value = currentQuery;
      document.title = currentQuery + ' - Ligma Browser';
      window.scrollTo(0, 0);

      // Show loading
      resultsList.innerHTML = '<div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none"><div class="loading-bar" style="width:300px"></div></div>';
      statsEl.innerHTML = '';
      pagEl.innerHTML = '';

      const data = await fetchResults(currentQuery, currentPage);

      if (data.error) {
        resultsList.innerHTML = '<div style="text-align:center;padding:4rem;color:var(--text3)"><p>' + esc(data.error) + '</p></div>';
        return;
      }

      if (!data.results.length) {
        resultsList.innerHTML = '<div style="text-align:center;padding:4rem;color:var(--text3)"><p>No results found for "<strong>' + esc(currentQuery) + '</strong>"</p></div>';
        statsEl.innerHTML = '';
        return;
      }

      statsEl.innerHTML = 'About <strong>' + data.total + '</strong> results for <strong>' + esc(currentQuery) + '</strong>';

      resultsList.innerHTML = data.results.map(r => {
        const domain = (() => { try { return new URL(r.url).hostname.replace('www.', ''); } catch { return ''; } })();
        const favicon = domain ? 'https://' + domain + '/favicon.ico' : '';
        return '<div class="result-item">' +
          '<div class="result-url">' +
          (favicon ? '<img src="' + esc(favicon) + '" width="14" height="14" alt="" onerror="this.style.display=\'none\'">' : '') +
          '<span>' + esc(r.displayUrl || r.url) + '</span></div>' +
          '<a href="' + esc(r.url) + '" target="_blank" rel="noopener" class="result-title">' + esc(r.title) + '</a>' +
          (r.desc ? '<p class="result-desc">' + esc(r.desc) + '</p>' : '') +
          '</div>';
      }).join('');

      // Pagination
      pagEl.innerHTML = '';
      if (currentPage > 1) {
        const prevBtn = document.createElement('button');
        prevBtn.textContent = 'Previous';
        prevBtn.addEventListener('click', () => doSearch(currentQuery, currentPage - 1));
        pagEl.appendChild(prevBtn);
      }
      if (data.results.length >= 20) {
        const nextBtn = document.createElement('button');
        nextBtn.textContent = 'Next';
        nextBtn.className = 'active';
        nextBtn.addEventListener('click', () => doSearch(currentQuery, currentPage + 1));
        pagEl.appendChild(nextBtn);
      }
    }

    function goHome() {
      homeEl.style.display = 'flex';
      resultsEl.classList.remove('show');
      document.title = 'Ligma Browser';
      searchInput.value = '';
      resultsInput.value = '';
      searchInput.focus();
    }

    // ============================================
    // EVENT HANDLERS
    // ============================================
    $('#searchForm').addEventListener('submit', e => {
      e.preventDefault();
      easterEggSearch(searchInput.value, 1);
    });

    $('#resultsForm').addEventListener('submit', e => {
      e.preventDefault();
      easterEggSearch(resultsInput.value, 1);
    });

    $('#logoHome').addEventListener('click', goHome);

    // "/" to focus search
    document.addEventListener('keydown', e => {
      if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        if (resultsEl.classList.contains('show')) resultsInput.focus();
        else searchInput.focus();
      }
      if (e.key === 'Escape') {
        if (aboutModal.classList.contains('open')) { aboutModal.classList.remove('open'); return; }
        if (shortcutsModal.classList.contains('open')) { shortcutsModal.classList.remove('open'); return; }
        if (settingsMenu.classList.contains('open')) { settingsMenu.classList.remove('open'); return; }
        if (resultsEl.classList.contains('show')) goHome();
      }
    });

    // URL hash routing
    function checkHash() {
      const hash = location.hash;
      if (hash.startsWith('#q=')) {
        const q = decodeURIComponent(hash.slice(3));
        if (q) easterEggSearch(q, 1);
      } else if (hash === '' || hash === '#') {
        goHome();
      }
    }
    window.addEventListener('hashchange', checkHash);
    checkHash();

    // ===== SETTINGS MENU =====
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsMenu = document.getElementById('settingsMenu');
    const aboutBtn = document.getElementById('aboutBtn');
    const aboutModal = document.getElementById('aboutModal');
    const closeAbout = document.getElementById('closeAbout');
    const shortcutsBtn = document.getElementById('shortcutsBtn');
    const shortcutsModal = document.getElementById('shortcutsModal');
    const closeShortcuts = document.getElementById('closeShortcuts');
    const toggleDark = document.getElementById('toggleDark');
    const darkToggle = document.getElementById('darkToggle');
    const toggleParticles = document.getElementById('toggleParticles');
    const particleToggle = document.getElementById('particleToggle');

    settingsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      settingsMenu.classList.toggle('open');
    });

    document.addEventListener('click', (e) => {
      if (!settingsMenu.contains(e.target) && !settingsBtn.contains(e.target)) {
        settingsMenu.classList.remove('open');
      }
    });

    aboutBtn.addEventListener('click', () => { settingsMenu.classList.remove('open'); aboutModal.classList.add('open'); });
    closeAbout.addEventListener('click', () => aboutModal.classList.remove('open'));
    aboutModal.addEventListener('click', (e) => { if (e.target === aboutModal) aboutModal.classList.remove('open'); });

    shortcutsBtn.addEventListener('click', () => { settingsMenu.classList.remove('open'); shortcutsModal.classList.add('open'); });
    closeShortcuts.addEventListener('click', () => shortcutsModal.classList.remove('open'));
    shortcutsModal.addEventListener('click', (e) => { if (e.target === shortcutsModal) shortcutsModal.classList.remove('open'); });

    toggleDark.addEventListener('click', () => {
      darkToggle.classList.toggle('on');
      document.body.classList.toggle('light-mode', !darkToggle.classList.contains('on'));
    });

    toggleParticles.addEventListener('click', () => {
      particleToggle.classList.toggle('on');
      const canvas = document.getElementById('particles');
      if (particleToggle.classList.contains('on')) {
        canvas.style.display = 'block';
        window._particleApi.start();
      } else {
        canvas.style.display = 'none';
        window._particleApi.stop();
      }
    });

    // ===== EASTER EGGS =====

    // Konami code
    const konamiCode = [38,38,40,40,37,39,37,39,66,65];
    let konamiIndex = 0;
    document.addEventListener('keydown', (e) => {
      if (e.keyCode === konamiCode[konamiIndex]) {
        konamiIndex++;
        if (konamiIndex === konamiCode.length) {
          konamiIndex = 0;
          document.body.style.animation = 'none';
          document.body.offsetHeight;
          document.body.style.animation = 'konamiShake .5s ease';
          showToast('KONAMI CODE ACTIVATED');
          spawnConfetti();
        }
      } else {
        konamiIndex = 0;
      }
    });

    function showToast(msg) {
      const t = document.createElement('div');
      t.textContent = msg;
      Object.assign(t.style, {
        position:'fixed', bottom:'30px', left:'50%', transform:'translateX(-50%)',
        padding:'12px 28px', borderRadius:'999px', fontWeight:'600', fontSize:'.9rem',
        background:'linear-gradient(135deg,#32CD32,#00FF00)', color:'#000',
        zIndex:'999', animation:'fadeIn .3s ease', pointerEvents:'none',
      });
      document.body.appendChild(t);
      setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(() => t.remove(), 300); }, 2000);
    }

    function spawnConfetti() {
      for (let i = 0; i < 60; i++) {
        const c = document.createElement('div');
        const colors = ['#32CD32','#00FF00','#4ADE80','#22d3ee','#a3e635','#f59e0b','#ef4444'];
        Object.assign(c.style, {
          position:'fixed', top:'-10px', left: Math.random()*100+'vw',
          width: (6+Math.random()*8)+'px', height: (6+Math.random()*8)+'px',
          background: colors[Math.floor(Math.random()*colors.length)],
          borderRadius: Math.random()>.5?'50%':'2px', zIndex:'998', pointerEvents:'none',
          animation: `confettiFall ${1.5+Math.random()*2}s linear forwards`,
          animationDelay: Math.random()*.5+'s',
        });
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }
    }

    // Search easter eggs
    const easterEggs = {
      'ligma': 'ligma balls lmao gottem',
      '42': 'The Answer to Life, the Universe, and Everything.',
      'matrix': 'Follow the white rabbit.',
      'hello': 'Is it me you\'re looking for? 🎵',
      'hack': 'Access granted. Just kidding, this is a search engine.',
      'party': 'party',
      'roll': Math.floor(Math.random() * 100 + 1) + '',
      'sudo': 'Nice try. You are not root.',
      'password': 'hunter2',
      'what is love': 'Baby don\'t hurt me.',
      'the answer': '42.',
      'google': 'You\'re already here. Why would you Google Google?',
      'browser': 'This is a search engine, not a browser. We searched the web for "browser" and found ourselves.',
    };

    const origSearch = doSearch;
    function easterEggSearch(q, p) {
      const lower = q.toLowerCase().trim();
      if (lower === 'party') { spawnConfetti(); showToast('PARTY MODE'); }
      else if (easterEggs[lower]) { showToast(easterEggs[lower]); }
      origSearch(q, p);
    }

    // Easter egg: triple-click logo
    let logoClicks = 0;
    let logoTimer = null;
    document.getElementById('logo').addEventListener('click', () => {
      logoClicks++;
      clearTimeout(logoTimer);
      logoTimer = setTimeout(() => { logoClicks = 0; }, 500);
      if (logoClicks >= 3) {
        logoClicks = 0;
        showToast('You found the secret!');
        spawnConfetti();
        document.getElementById('logo').style.transform = 'rotate(360deg)';
        document.getElementById('logo').style.transition = 'transform 1s ease';
        setTimeout(() => { document.getElementById('logo').style.transform = ''; }, 1000);
      }
    });
  })();
  </script>
  <style>
    @keyframes konamiShake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-15px)} 40%{transform:translateX(15px)} 60%{transform:translateX(-10px)} 80%{transform:translateX(10px)}
    }
    @keyframes confettiFall {
      0%{transform:translateY(0) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0}
    }
  </style>
</body>
</html>
